name: Secret Scan (gitleaks)
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (binary, no org license needed)
        run: |
          VER="8.30.1"   # set to the latest gitleaks release
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --exit-code 1

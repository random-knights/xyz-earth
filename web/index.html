<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Living globe + Planet Health Score — keyless, open-source Earth viewer for rand0m.ai">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="xyz_earth">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>rand0m · xyz-earth</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- earth2d — the north-star 2D-canvas renderer. The vendored d3-geo +
       topojson-client (public domain / ISC) load first, then the renderer
       modules register the window.__earth2d mount shim the Dart bridge drives.
       All keyless: vectors/masks load from the bundled Flutter assets, with a
       public-domain world-atlas CDN as a last-resort fallback. -->
  <script defer src="earth2d/vendor/d3.min.js"></script>
  <script defer src="earth2d/vendor/topojson-client.min.js"></script>
  <script defer src="earth2d_projections.js"></script>
  <script defer src="earth2d_scalar.js"></script>
  <script defer src="earth2d_flow.js"></script>
  <script defer src="earth2d_points.js"></script>
  <script defer src="earth2d_mount.js"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
